<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1260" viewBox="0 0 1800 1260" role="img" aria-labelledby="title desc">
  <title id="title">Riela workflow execution sequence</title>
  <desc id="desc">Sequence diagram showing invocation, workflow loading, session creation, inbox resolution from SQLite workflow_messages, node execution, RuntimePublication outbox append, and step advance.</desc>
  <defs>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#394150"/>
    </marker>
    <marker id="arrow-teal" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#2D8C8C"/>
    </marker>
    <marker id="arrow-orange" markerWidth="14" markerHeight="14" refX="11" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L12,7 L2,12 Z" fill="#B86C2E"/>
    </marker>
    <style>
      .canvas { fill: #fbfcfe; }
      .title { font: 700 34px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #121826; }
      .subtitle { font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .participant { fill: #eef2f4; stroke: #607180; stroke-width: 2.5; }
      .participant-text { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #17202a; }
      .lifeline { stroke: #aeb8c2; stroke-width: 2; stroke-dasharray: 8 8; }
      .activation { fill: #ffffff; stroke: #607180; stroke-width: 2; }
      .message { stroke: #394150; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .message-teal { stroke: #2D8C8C; stroke-width: 2.5; fill: none; marker-end: url(#arrow-teal); }
      .message-orange { stroke: #B86C2E; stroke-width: 2.5; fill: none; marker-end: url(#arrow-orange); }
      .return { stroke-dasharray: 7 7; }
      .label-bg { fill: #fbfcfe; opacity: 0.96; }
      .label { font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .loop { fill: none; stroke: #8b949e; stroke-width: 2; stroke-dasharray: 10 8; }
      .loop-title { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .note { fill: #fff7ed; stroke: #c47d3d; stroke-width: 2; }
      .note-text { font: 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5f3b14; }
    </style>
  </defs>

  <rect class="canvas" width="1800" height="1260"/>
  <text class="title" x="900" y="54" text-anchor="middle">Riela workflow execution sequence</text>
  <text class="subtitle" x="900" y="84" text-anchor="middle">From invocation to SQLite inbox read, node execution, RuntimePublication outbox append, and step advance</text>

  <g id="participants">
    <g transform="translate(70 120)">
      <rect class="participant" width="176" height="82" rx="8"/>
      <text class="participant-text" x="88" y="26" text-anchor="middle">Invocation</text>
      <text class="participant-text" x="88" y="48" text-anchor="middle">CLI / Event /</text>
      <text class="participant-text" x="88" y="70" text-anchor="middle">GraphQL / call-step</text>
    </g>
    <g transform="translate(315 120)">
      <rect class="participant" width="176" height="82" rx="8"/>
      <text class="participant-text" x="88" y="26" text-anchor="middle">Workflow bundle</text>
      <text class="participant-text" x="88" y="48" text-anchor="middle">workflow.json</text>
      <text class="participant-text" x="88" y="70" text-anchor="middle">steps / nodes</text>
    </g>
    <g transform="translate(565 120)">
      <rect class="participant" width="176" height="82" rx="8"/>
      <text class="participant-text" x="88" y="34" text-anchor="middle">Deterministic</text>
      <text class="participant-text" x="88" y="58" text-anchor="middle">WorkflowRunner</text>
    </g>
    <g transform="translate(830 120)">
      <rect class="participant" width="190" height="82" rx="8"/>
      <text class="participant-text" x="95" y="26" text-anchor="middle">RuntimeStore</text>
      <text class="participant-text" x="95" y="48" text-anchor="middle">SQLite</text>
      <text class="participant-text" x="95" y="70" text-anchor="middle">workflow_messages</text>
    </g>
    <g transform="translate(1110 120)">
      <rect class="participant" width="176" height="82" rx="8"/>
      <text class="participant-text" x="88" y="34" text-anchor="middle">Node / Add-on</text>
      <text class="participant-text" x="88" y="58" text-anchor="middle">Backend</text>
    </g>
    <g transform="translate(1360 120)">
      <rect class="participant" width="176" height="82" rx="8"/>
      <text class="participant-text" x="88" y="34" text-anchor="middle">RuntimePublication</text>
      <text class="participant-text" x="88" y="58" text-anchor="middle">outbox</text>
    </g>
    <g transform="translate(1585 120)">
      <rect class="participant" width="176" height="82" rx="8"/>
      <text class="participant-text" x="88" y="26" text-anchor="middle">Next step</text>
      <text class="participant-text" x="88" y="48" text-anchor="middle">callee workflow</text>
      <text class="participant-text" x="88" y="70" text-anchor="middle">or root output</text>
    </g>
  </g>

  <g id="lifelines">
    <line class="lifeline" x1="158" y1="202" x2="158" y2="1100"/>
    <line class="lifeline" x1="403" y1="202" x2="403" y2="1100"/>
    <line class="lifeline" x1="653" y1="202" x2="653" y2="1100"/>
    <line class="lifeline" x1="925" y1="202" x2="925" y2="1100"/>
    <line class="lifeline" x1="1198" y1="202" x2="1198" y2="1100"/>
    <line class="lifeline" x1="1448" y1="202" x2="1448" y2="1100"/>
    <line class="lifeline" x1="1673" y1="202" x2="1673" y2="1100"/>
    <rect class="activation" x="645" y="330" width="16" height="635" rx="4"/>
    <rect class="activation" x="917" y="390" width="16" height="325" rx="4"/>
    <rect class="activation" x="1190" y="580" width="16" height="96" rx="4"/>
    <rect class="activation" x="1440" y="730" width="16" height="182" rx="4"/>
  </g>

  <g id="loop">
    <rect class="loop" x="540" y="360" width="1055" height="600" rx="12"/>
    <text class="loop-title" x="562" y="386">loop per currentStepId until no next step</text>
  </g>

  <g id="messages">
    <line class="message" x1="158" y1="255" x2="403" y2="255"/>
    <rect class="label-bg" x="178" y="228" width="205" height="24"/>
    <text class="label" x="280" y="245" text-anchor="middle">1. invoke workflow with input</text>

    <line class="message" x1="403" y1="315" x2="653" y2="315"/>
    <rect class="label-bg" x="424" y="288" width="210" height="24"/>
    <text class="label" x="529" y="305" text-anchor="middle">2. load and validate bundle</text>

    <line class="message-teal" x1="653" y1="375" x2="925" y2="375"/>
    <rect class="label-bg" x="676" y="348" width="226" height="24"/>
    <text class="label" x="789" y="365" text-anchor="middle">3. create/load WorkflowSession</text>

    <line class="message-teal" x1="653" y1="450" x2="925" y2="450"/>
    <rect class="label-bg" x="673" y="423" width="234" height="24"/>
    <text class="label" x="790" y="440" text-anchor="middle">4. list inbox by toStepId</text>

    <line class="message-teal return" x1="925" y1="510" x2="653" y2="510"/>
    <rect class="label-bg" x="676" y="483" width="226" height="24"/>
    <text class="label" x="789" y="500" text-anchor="middle">5. ordered payload_json rows</text>

    <line class="message" x1="653" y1="575" x2="1198" y2="575"/>
    <rect class="label-bg" x="735" y="548" width="382" height="24"/>
    <text class="label" x="926" y="565" text-anchor="middle">6. execute node with resolvedInput + variables.inbox.latest</text>

    <line class="message return" x1="1198" y1="655" x2="653" y2="655"/>
    <rect class="label-bg" x="782" y="628" width="288" height="24"/>
    <text class="label" x="926" y="645" text-anchor="middle">7. adapterOutput or candidate JSON</text>

    <line class="message-orange" x1="653" y1="730" x2="1448" y2="730"/>
    <rect class="label-bg" x="848" y="703" width="406" height="24"/>
    <text class="label" x="1051" y="720" text-anchor="middle">8. publishAcceptedOutput: validate contract and candidate source</text>

    <path class="message-orange" d="M1456 790 C1528 790 1528 840 1456 840"/>
    <rect class="label-bg" x="1320" y="800" width="256" height="24"/>
    <text class="label" x="1448" y="817" text-anchor="middle">9. evaluate transition labels</text>

    <line class="message-orange" x1="1448" y1="880" x2="925" y2="880"/>
    <rect class="label-bg" x="984" y="853" width="405" height="24"/>
    <text class="label" x="1187" y="870" text-anchor="middle">10. append WorkflowMessageRecord fromStepId to toStepId</text>

    <line class="message-orange return" x1="925" y1="940" x2="1448" y2="940"/>
    <rect class="label-bg" x="1022" y="913" width="330" height="24"/>
    <text class="label" x="1187" y="930" text-anchor="middle">11. return publishedMessages or fail append</text>

    <line class="message-orange return" x1="1448" y1="1000" x2="653" y2="1000"/>
    <rect class="label-bg" x="870" y="973" width="360" height="24"/>
    <text class="label" x="1050" y="990" text-anchor="middle">12. WorkflowPublicationResult + optional rootOutput</text>

    <line class="message" x1="653" y1="1060" x2="1673" y2="1060"/>
    <rect class="label-bg" x="940" y="1033" width="446" height="24"/>
    <text class="label" x="1163" y="1050" text-anchor="middle">13. currentStepId = first published toStepId, or finish with rootOutput</text>
  </g>

  <g id="notes">
    <rect class="note" x="92" y="1138" width="742" height="70" rx="8"/>
    <text class="note-text" x="116" y="1167">Boundary: workflow_messages.payload_json is authoritative transport.</text>
    <text class="note-text" x="116" y="1192">Legacy execution-local inbox/input.json and outbox/output.json mirrors are not part of the current flow.</text>
    <rect class="note" x="875" y="1138" width="820" height="70" rx="8"/>
    <text class="note-text" x="899" y="1167">Cross-workflow calls use the same step-addressed model as transitions.</text>
    <text class="note-text" x="899" y="1192">The callee target is explicit; workflow-level entry resolves to managerStepId or entryStepId.</text>
  </g>
</svg>
