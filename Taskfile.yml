version: "3"

vars:
  PROJECT_NAME: riela

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build:homebrew:
    desc: Build standalone Homebrew CLI release archives for the current platform, or pass targets after --
    cmds:
      - scripts/build-homebrew-release.sh {{.CLI_ARGS}}

  build:homebrew-cask:
    desc: Build signed and notarized macOS Cask DMGs with RielaApp and riela, or pass targets after --
    cmds:
      - scripts/build-homebrew-cask-release.sh {{.CLI_ARGS}}

  app:build:
    desc: Build RielaApp.app (defaults to release; override with CONFIGURATION=debug)
    cmds:
      - CONFIGURATION="${CONFIGURATION:-release}" scripts/build-riela-menu-bar-app.sh

  app:run:
    desc: Run RielaApp.app, building it first when missing (pass app args after --)
    cmds:
      - |
        set -euo pipefail
        app_path="${RIELA_APP_PATH:-.build/${CONFIGURATION:-release}/RielaApp.app}"
        if [ ! -d "$app_path" ]; then
          CONFIGURATION="${CONFIGURATION:-release}" scripts/build-riela-menu-bar-app.sh
        fi
        if [ -n "{{.CLI_ARGS}}" ]; then
          open "$app_path" --args --project-root "$PWD" {{.CLI_ARGS}}
        else
          open "$app_path" --args --project-root "$PWD"
        fi

  app:rebuild-run:
    desc: Quit RielaApp, rebuild RielaApp.app, and open it again (pass app args after --)
    cmds:
      - |
        set -euo pipefail
        osascript -e 'tell application id "com.tacogips.riela.menubar" to quit' >/dev/null 2>&1 || true
        for _ in 1 2 3 4 5; do
          pgrep -x RielaApp >/dev/null 2>&1 || break
          sleep 0.2
        done
        if pgrep -x RielaApp >/dev/null 2>&1; then
          pkill -x RielaApp || true
        fi
        CONFIGURATION="${CONFIGURATION:-release}" scripts/build-riela-menu-bar-app.sh
        app_path="${RIELA_APP_PATH:-.build/${CONFIGURATION:-release}/RielaApp.app}"
        if [ -n "{{.CLI_ARGS}}" ]; then
          open "$app_path" --args --project-root "$PWD" {{.CLI_ARGS}}
        else
          open "$app_path" --args --project-root "$PWD"
        fi

  homebrew:formula:
    desc: Render Formula/riela.rb from dist/homebrew checksums (pass the version after --)
    cmds:
      - scripts/render-homebrew-formula.sh {{.CLI_ARGS}}

  homebrew:cask:
    desc: Render Casks/riela.rb from dist/homebrew-cask checksums (pass the version after --)
    cmds:
      - scripts/render-homebrew-cask.sh {{.CLI_ARGS}}

  homebrew:tap-formula:
    desc: Render riela into the sibling tacogips/homebrew-tap repository (pass version after --)
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:tap-formula -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-formula.sh "{{.CLI_ARGS}}" ../homebrew-tap/Formula/riela.rb

  homebrew:tap-cask:
    desc: Render riela cask into the sibling tacogips/homebrew-tap repository (pass version after --)
    cmds:
      - |
        set -euo pipefail
        if [ -z "{{.CLI_ARGS}}" ]; then
          echo "usage: task homebrew:tap-cask -- <version>" >&2
          exit 2
        fi
        scripts/render-homebrew-cask.sh "{{.CLI_ARGS}}" ../homebrew-tap/Casks/riela.rb

  release:homebrew-cask-local:
    desc: Build, notarize, upload, and render the sibling tap cask for a v<version> tag
    cmds:
      - scripts/release-homebrew-cask-local.sh {{.CLI_ARGS}}
